version: '3.8'

services:
  db:
    image: postgres:15
    container_name: spelling_bee_db
    environment:
      POSTGRES_DB: spelling_bee
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  bot:
    build: .
    container_name: spelling_bee_telegram_bot
    depends_on:
      - db
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=postgresql://bot:secret@db:5432/spelling_bee
    volumes:
      - ./audio:/app/audio
    restart: unless-stopped

volumes:
  postgres_data:
